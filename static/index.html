<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Management</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0f172a;--card:#1e293b;--card-hover:#273548;--border:#334155;
--text:#e2e8f0;--text-muted:#94a3b8;--primary:#3b82f6;--primary-hover:#2563eb;
--success:#22c55e;--warning:#f59e0b;--danger:#ef4444;--info:#06b6d4;
--purple:#a855f7;--orange:#f97316;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--primary);text-decoration:none}
button{cursor:pointer;font-family:inherit;border:none;outline:none}
input,select,textarea{font-family:inherit;outline:none}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#475569}
.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:400px;backdrop-filter:blur(10px)}
.login-card h1{text-align:center;margin-bottom:8px;font-size:24px;font-weight:700}
.login-card p{text-align:center;color:var(--text-muted);margin-bottom:30px;font-size:14px}
.form-group{margin-bottom:20px}
.form-group label{display:block;margin-bottom:6px;font-size:13px;font-weight:500;color:var(--text-muted)}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;transition:border-color .2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary)}
.form-group textarea{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.btn{padding:10px 20px;border-radius:8px;font-size:14px;font-weight:500;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-hover)}
.btn-success{background:var(--success);color:#fff}.btn-success:hover{opacity:.9}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{opacity:.9}
.btn-warning{background:var(--warning);color:#000}.btn-warning:hover{opacity:.9}
.btn-ghost{background:transparent;color:var(--text-muted);border:1px solid var(--border)}.btn-ghost:hover{background:var(--card);color:var(--text)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-full{width:100%;justify-content:center}
.error-msg{color:var(--danger);font-size:13px;margin-top:10px;text-align:center;min-height:20px}
.app{display:flex;min-height:100vh}
.sidebar{width:260px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100;transition:transform .3s}
.sidebar-header{padding:20px;border-bottom:1px solid var(--border)}
.sidebar-header h2{font-size:18px;font-weight:700}
.sidebar-header p{font-size:12px;color:var(--text-muted);margin-top:2px}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:8px;color:var(--text-muted);font-size:14px;cursor:pointer;transition:all .2s;margin-bottom:2px}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.active{background:var(--primary);color:#fff}
.nav-item svg{width:18px;height:18px;flex-shrink:0}
.nav-section{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);padding:16px 14px 6px;font-weight:600}
.sidebar-footer{padding:16px;border-top:1px solid var(--border)}
.main{margin-left:260px;flex:1;padding:24px;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.topbar h1{font-size:24px;font-weight:700}
.topbar-actions{display:flex;align-items:center;gap:12px}
.menu-toggle{display:none;background:none;border:none;color:var(--text);font-size:24px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;backdrop-filter:blur(10px)}
.stat-card .stat-label{font-size:13px;color:var(--text-muted);margin-bottom:8px}
.stat-card .stat-value{font-size:28px;font-weight:700}
.stat-card .stat-sub{font-size:12px;color:var(--text-muted);margin-top:4px}
.stat-card.blue .stat-value{color:var(--primary)}
.stat-card.green .stat-value{color:var(--success)}
.stat-card.yellow .stat-value{color:var(--warning)}
.stat-card.red .stat-value{color:var(--danger)}
.stat-card.purple .stat-value{color:var(--purple)}
.stat-card.cyan .stat-value{color:var(--info)}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;backdrop-filter:blur(10px);margin-bottom:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-header h3{font-size:16px;font-weight:600}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th,td{padding:12px 16px;text-align:left;font-size:13px;border-bottom:1px solid var(--border)}
th{color:var(--text-muted);font-weight:500;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
tr:hover{background:rgba(255,255,255,.02)}
.badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.badge-received{background:rgba(59,130,246,.15);color:var(--primary)}
.badge-diagnosed{background:rgba(245,158,11,.15);color:var(--warning)}
.badge-waiting_parts{background:rgba(249,115,22,.15);color:var(--orange)}
.badge-repairing{background:rgba(168,85,247,.15);color:var(--purple)}
.badge-testing{background:rgba(6,182,212,.15);color:var(--info)}
.badge-delivered{background:rgba(34,197,94,.15);color:var(--success)}
.badge-ok{background:rgba(34,197,94,.15);color:var(--success)}
.badge-low{background:rgba(239,68,68,.15);color:var(--danger)}
.badge-active{background:rgba(34,197,94,.15);color:var(--success)}
.badge-inactive{background:rgba(239,68,68,.15);color:var(--danger)}
.badge-draft{background:rgba(148,163,184,.15);color:var(--text-muted)}
.badge-sent{background:rgba(59,130,246,.15);color:var(--primary)}
.badge-cancelled{background:rgba(239,68,68,.15);color:var(--danger)}
.badge-partial{background:rgba(245,158,11,.15);color:var(--warning)}
.filter-bar{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:20px;align-items:center}
.filter-bar input,.filter-bar select{padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--primary)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-overlay.active{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border)}
.modal-header h2{font-size:18px;font-weight:600}
.modal-close{background:none;border:none;color:var(--text-muted);font-size:24px;cursor:pointer;padding:4px}
.modal-close:hover{color:var(--text)}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:12px}
.toast-container{position:fixed;top:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;animation:slideIn .3s;display:flex;align-items:center;gap:10px;min-width:280px}
.toast.success{background:rgba(34,197,94,.9);color:#fff}
.toast.error{background:rgba(239,68,68,.9);color:#fff}
.toast.info{background:rgba(59,130,246,.9);color:#fff}
@keyframes slideIn{from{opacity:0;transform:translateX(100px)}to{opacity:1;transform:translateX(0)}}
.loading{display:flex;align-items:center;justify-content:center;padding:40px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px;color:var(--text-muted)}
.empty svg{width:48px;height:48px;margin-bottom:12px;opacity:.5}
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:20px}
.pagination button{padding:6px 12px;border-radius:6px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:13px}
.pagination button:hover{border-color:var(--primary)}
.pagination button.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.pagination button:disabled{opacity:.4;cursor:not-allowed}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.detail-item{padding:12px;background:var(--bg);border-radius:8px}
.detail-item .label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.detail-item .value{font-size:14px;font-weight:500}
.detail-full{grid-column:1/-1}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
.tab-bar{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.tab-btn{padding:10px 16px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text-muted);font-size:14px;cursor:pointer;transition:all .2s}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}
.tab-btn:hover{color:var(--text)}
.match-row{display:grid;grid-template-columns:1fr 60px 1fr 60px;gap:8px;align-items:center;padding:12px;border-bottom:1px solid var(--border)}
.match-row input{padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;width:100%}
.match-row input:focus{border-color:var(--primary)}
.match-label{font-size:12px;color:var(--text-muted);text-align:center}
@media(max-width:768px){
.sidebar{transform:translateX(-100%)}
.sidebar.open{transform:translateX(0)}
.sidebar-overlay.open{display:block}
.main{margin-left:0}
.menu-toggle{display:block}
.stats-grid{grid-template-columns:1fr 1fr}
.form-row{grid-template-columns:1fr}
.detail-grid{grid-template-columns:1fr}
.filter-bar{flex-direction:column;align-items:stretch}
}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast-container" id="toastContainer"></div>
<div class="modal-overlay" id="modalOverlay">
<div class="modal" id="modalContent"></div>
</div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<script>
const ICONS={
dashboard:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>',
repairs:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>',
customers:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>',
inventory:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>',
services:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>',
payments:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>',
expenses:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>',
daily:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
suppliers:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>',
purchase_orders:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M9 14l2 2 4-4"/></svg>',

staff:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
settings:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>',
logout:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>'
};
const STATUSES=['received','diagnosed','waiting_parts','repairing','testing','delivered'];
const STATUS_COLORS={received:'badge-received',diagnosed:'badge-diagnosed',waiting_parts:'badge-waiting_parts',repairing:'badge-repairing',testing:'badge-testing',delivered:'badge-delivered'};
const PO_STATUSES=['draft','sent','partially_received','received','cancelled'];
const PO_STATUS_COLORS={draft:'badge-draft',sent:'badge-sent',partially_received:'badge-partial',received:'badge-delivered',cancelled:'badge-cancelled'};
const CURRENCIES=['USD','BDT','INR','NGN'];
const PAYMENT_METHODS=['Cash','bKash','Nagad','Rocket','Card','Bank Transfer','Other'];
let state={page:'dashboard',user:null,settings:{shop_name:'Shop Management',default_currency:'USD'},repairs:{data:[],page:1,total:0},customers:{data:[],page:1,total:0},parts:{data:[],page:1,total:0},services:{data:[],page:1,total:0},payments:{data:[],page:1,total:0},expenses:{data:[],page:1,total:0},daily_sales:{data:[],page:1,total:0},staff:{data:[],page:1,total:0},suppliers:{data:[],page:1,total:0},purchase_orders:{data:[],page:1,total:0},dashboard:{},reports:{},filters:{},expense_categories:[],catalog:{brands:[],models:[],categories:[],types:[]},current_supplier_id:null,current_po_id:null,settings_tab:'general'};
async function api(url,opts={}){const token=localStorage.getItem('token');opts.headers={'Content-Type':'application/json',...opts.headers};if(token)opts.headers['Authorization']='Bearer '+token;try{const res=await fetch(url,opts);const data=await res.json();if(res.status===401){localStorage.removeItem('token');state.user=null;render();return{ok:false,status:401,data};}return{ok:res.ok,status:res.status,data};}catch(e){return{ok:false,status:0,data:{error:'Network error'}};}}
function toast(msg,type='info'){const c=document.getElementById('toastContainer');const t=document.createElement('div');t.className='toast '+type;t.textContent=msg;c.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},3000);}
function showModal(html){const o=document.getElementById('modalOverlay');const m=document.getElementById('modalContent');m.innerHTML=html;o.classList.add('active');}
function hideModal(){document.getElementById('modalOverlay').classList.remove('active');}
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)hideModal();});
function toggleSidebar(){document.querySelector('.sidebar').classList.toggle('open');document.getElementById('sidebarOverlay').classList.toggle('open');}
function setPage(page){state.page=page;state.filters={};state.current_supplier_id=null;state.current_po_id=null;render();document.querySelector('.sidebar')?.classList.remove('open');document.getElementById('sidebarOverlay')?.classList.remove('open');}
function formatCurrency(amt,cur){return (cur||state.settings.default_currency)+' '+Number(amt||0).toFixed(2);}
function formatDate(d){if(!d)return'-';return new Date(d).toLocaleDateString();}
function formatDateTime(d){if(!d)return'-';return new Date(d).toLocaleString();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function renderLogin(){return`<div class="login-page"><div class="login-card"><h1>${esc(state.settings.shop_name||'Shop Management')}</h1><p>Admin Panel Login</p><form onsubmit="handleLogin(event)"><div class="form-group"><label>Email</label><input type="email" id="loginEmail" required placeholder="admin@shop.com"></div><div class="form-group"><label>Password</label><input type="password" id="loginPassword" required placeholder="Password"></div><button type="submit" class="btn btn-primary btn-full" id="loginBtn">Sign In</button><div class="error-msg" id="loginError"></div></form></div></div>`;}
async function handleLogin(e){e.preventDefault();const email=document.getElementById('loginEmail').value;const password=document.getElementById('loginPassword').value;const btn=document.getElementById('loginBtn');if(btn){btn.textContent='Signing in...';btn.disabled=true;}const r=await api('/api/auth/login',{method:'POST',body:JSON.stringify({email,password})});if(r.ok){localStorage.setItem('token',r.data.access_token);state.user=r.data.user||{email};toast('Login successful','success');state.page='dashboard';render();loadSettings();loadDashboard();}else{const err=document.getElementById('loginError');if(err)err.textContent=r.data.detail||'Invalid credentials';}if(btn){btn.textContent='Sign In';btn.disabled=false;}}
function renderSidebar(){const navs=[{id:'dashboard',icon:'dashboard',label:'Dashboard'},{id:'repairs',icon:'repairs',label:'Repairs'},{id:'customers',icon:'customers',label:'Customers'},{id:'inventory',icon:'inventory',label:'Inventory'},{id:'services',icon:'services',label:'Services'},{id:'payments',icon:'payments',label:'Payments'},{id:'expenses',icon:'expenses',label:'Expenses'},{id:'daily',icon:'daily',label:'Daily Sales'},{id:'suppliers',icon:'suppliers',label:'Suppliers'},{id:'purchase_orders',icon:'purchase_orders',label:'Purchase Orders'},{id:'reports',icon:'reports',label:'Reports'}];const adminNavs=[{id:'staff',icon:'staff',label:'Staff'},{id:'settings',icon:'settings',label:'Settings'}];return`<div class="sidebar" id="sidebar"><div class="sidebar-header"><h2>${esc(state.settings.shop_name||'Shop Management')}</h2><p>Admin Panel</p></div><nav class="sidebar-nav">${navs.map(n=>`<div class="nav-item${state.page===n.id?' active':''}" onclick="setPage('${n.id}')">${ICONS[n.icon]}${n.label}</div>`).join('')}<div class="nav-section">Administration</div>${adminNavs.map(n=>`<div class="nav-item${state.page===n.id?' active':''}" onclick="setPage('${n.id}')">${ICONS[n.icon]}${n.label}</div>`).join('')}</nav><div class="sidebar-footer"><div class="nav-item" onclick="handleLogout()">${ICONS.logout}Logout</div></div></div>`;}
async function handleLogout(){localStorage.removeItem('token');state.user=null;state.page='dashboard';render();toast('Logged out','info');}
async function loadSettings(){const r=await api('/api/settings');if(r.ok){state.settings={...state.settings,...r.data};document.title=state.settings.shop_name||'Shop Management';}}
async function loadDashboard(){const r=await api('/api/dashboard');if(r.ok){state.dashboard=r.data;}render();}
function renderDashboard(){const d=state.dashboard;return`<div class="topbar"><h1>Dashboard</h1><div class="topbar-actions"><button class="btn btn-ghost" onclick="loadDashboard()">Refresh</button></div></div><div class="stats-grid"><div class="stat-card blue"><div class="stat-label">Today's Repairs</div><div class="stat-value">${d.today_repairs||0}</div><div class="stat-sub">Total received today</div></div><div class="stat-card yellow"><div class="stat-label">Pending</div><div class="stat-value">${d.pending||0}</div><div class="stat-sub">Awaiting action</div></div><div class="stat-card purple"><div class="stat-label">In Progress</div><div class="stat-value">${d.in_progress||0}</div><div class="stat-sub">Currently being worked on</div></div><div class="stat-card green"><div class="stat-label">Completed Today</div><div class="stat-value">${d.completed_today||0}</div><div class="stat-sub">Delivered today</div></div><div class="stat-card green"><div class="stat-label">Today's Revenue</div><div class="stat-value">${formatCurrency(d.today_revenue)}</div><div class="stat-sub">Sales + Repair payments</div></div><div class="stat-card red"><div class="stat-label">Today's Expenses</div><div class="stat-value">${formatCurrency(d.today_expenses)}</div><div class="stat-sub">Total spent today</div></div><div class="stat-card cyan"><div class="stat-label">Net Profit</div><div class="stat-value">${formatCurrency(d.net_profit)}</div><div class="stat-sub">Revenue - Expenses</div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:20px"><div class="card"><div class="card-header"><h3>Recent Repairs</h3></div>${(d.recent_repairs||[]).length?`<table><thead><tr><th>ID</th><th>Customer</th><th>Model</th><th>Status</th></tr></thead><tbody>${(d.recent_repairs||[]).map(r=>`<tr><td>#${r.id}</td><td>${esc(r.customer_name||'-')}</td><td>${esc(r.model||'-')}</td><td><span class="badge ${STATUS_COLORS[r.status]||''}">${(r.status||'').replace('_',' ')}</span></td></tr>`).join('')}</tbody></table>`:'<div class="empty">No recent repairs</div>'}</div><div class="card"><div class="card-header"><h3>Low Stock Alerts</h3></div>${(d.low_stock||[]).length?`<table><thead><tr><th>Part</th><th>Model</th><th>Stock</th><th>Min</th></tr></thead><tbody>${(d.low_stock||[]).map(p=>`<tr><td>${esc(p.name)}</td><td>${esc(p.model||'-')}</td><td style="color:var(--danger)">${p.stock_qty}</td><td>${p.min_stock_alert}</td></tr>`).join('')}</tbody></table>`:'<div class="empty">All parts well stocked</div>'}</div></div>`;}
async function loadRepairs(page=1){const f=state.filters;let url=`/api/repairs?page=${page}&limit=15`;if(f.status)url+=`&status=${f.status}`;if(f.search)url+=`&search=${encodeURIComponent(f.search)}`;if(f.date_from)url+=`&date_from=${f.date_from}`;if(f.date_to)url+=`&date_to=${f.date_to}`;const r=await api(url);if(r.ok){state.repairs={data:r.data.items||[],page:r.data.page||page,total:r.data.total||0};}render();}
function renderRepairs(){const{data,page,total}=state.repairs;const pages=Math.ceil(total/15)||1;return`<div class="topbar"><h1>Repairs</h1><div class="topbar-actions"><button class="btn btn-primary" onclick="showNewRepairModal()">+ New Repair</button></div></div><div class="filter-bar"><select onchange="state.filters.status=this.value;loadRepairs()"><option value="">All Status</option>${STATUSES.map(s=>`<option value="${s}"${state.filters.status===s?' selected':''}>${s.replace('_',' ')}</option>`).join('')}</select><input type="text" placeholder="Search model or customer..." value="${esc(state.filters.search||'')}" onkeyup="if(event.key==='Enter'){state.filters.search=this.value;loadRepairs()}"><input type="date" value="${state.filters.date_from||''}" onchange="state.filters.date_from=this.value;loadRepairs()"><input type="date" value="${state.filters.date_to||''}" onchange="state.filters.date_to=this.value;loadRepairs()"><button class="btn btn-ghost btn-sm" onclick="state.filters={};loadRepairs()">Clear</button></div><div class="card"><div class="table-wrap"><table><thead><tr><th>ID</th><th>Customer</th><th>Model</th><th>Issues</th><th>Status</th><th>Assigned</th><th>Date</th><th>Actions</th></tr></thead><tbody>${data.length?data.map(r=>`<tr><td>#${r.id}</td><td>${esc(r.customer_name||'-')}</td><td>${esc(r.model||'-')}</td><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.issues||'-')}</td><td><span class="badge ${STATUS_COLORS[r.status]||''}">${(r.status||'').replace('_',' ')}</span></td><td>${esc(r.assigned_user_name||'-')}</td><td>${formatDate(r.created_at)}</td><td><div style="display:flex;gap:6px"><button class="btn btn-ghost btn-sm" onclick="showRepairDetail(${r.id})">View</button><select class="btn btn-ghost btn-sm" onchange="updateRepairStatus(${r.id},this.value)" style="padding:4px 8px;font-size:11px"><option value="">Status</option>${STATUSES.map(s=>`<option value="${s}">${s.replace('_',' ')}</option>`).join('')}</select></div></td></tr>`).join(''):'<tr><td colspan="8" class="empty">No repairs found</td></tr>'}</tbody></table></div></div><div class="pagination"><button ${page<=1?'disabled':''} onclick="loadRepairs(${page-1})">Prev</button><span style="color:var(--text-muted);font-size:13px">Page ${page} of ${pages}</span><button ${page>=pages?'disabled':''} onclick="loadRepairs(${page+1})">Next</button></div>`;}
async function updateRepairStatus(id,status){if(!status)return;const r=await api(`/api/repairs/${id}/status`,{method:'PATCH',body:JSON.stringify({status})});if(r.ok){toast('Status updated','success');loadRepairs(state.repairs.page);}else toast(r.data.error||'Failed to update status','error');}
async function showRepairDetail(id){const r=await api(`/api/repairs/${id}`);if(!r.ok)return toast('Failed to load repair','error');const rp=r.data;const parts=rp.parts_used||rp.parts||[];const pays=rp.payments||[];const totalParts=parts.reduce((s,p)=>s+Number(p.selling_price||0)*Number(p.qty||1),0);const totalPaid=pays.reduce((s,p)=>s+Number(p.amount||0),0);const serviceFee=Number(rp.service_fee||0);const grandTotal=totalParts+serviceFee;const balance=grandTotal-totalPaid;const canCancel=['received','diagnosed','waiting_parts','repairing'].includes(rp.status);const isAdmin=state.user&&(state.user.role==='admin'||state.user.role==='manager');
showModal(`<div class="modal-header"><h2>Repair #${rp.id}</h2><button class="modal-close" onclick="hideModal()">&times;</button></div><div class="modal-body"><div class="detail-grid"><div class="detail-item"><div class="label">Customer</div><div class="value">${esc(rp.customer_name||'-')}</div></div><div class="detail-item"><div class="label">Model</div><div class="value">${esc(rp.model||'-')}</div></div><div class="detail-item"><div class="label">IMEI</div><div class="value">${esc(rp.imei||'-')}</div></div><div class="detail-item"><div class="label">Status</div><div class="value"><span class="badge ${STATUS_COLORS[rp.status]||''}">${(rp.status||'').replace('_',' ')}</span></div></div><div class="detail-item"><div class="label">Assigned To</div><div class="value">${esc(rp.assigned_user_name||'Unassigned')}</div></div><div class="detail-item"><div class="label">Date</div><div class="value">${formatDateTime(rp.created_at)}</div></div><div class="detail-item detail-full"><div class="label">Issues</div><div class="value">${esc(rp.issues||'-')}</div></div><div class="detail-item detail-full"><div class="label">Notes</div><div class="value">${esc(rp.notes||'-')}</div></div></div>
<div style="margin-top:20px"><div class="card-header"><h3>Parts Used</h3><button class="btn btn-ghost btn-sm" onclick="showAddPartUsedModal(${rp.id})">+ Add Part</button></div><table><thead><tr><th>Part</th><th>Qty</th><th>Selling Price</th><th>Returned</th><th>Action</th></tr></thead><tbody>${parts.length?parts.map(p=>{const returned=Number(p.returned_qty||0);const canReturn=returned<Number(p.qty||0);return`<tr><td>${esc(p.name||p.part_name||'-')}</td><td>${p.qty||1}</td><td>${formatCurrency(p.selling_price)}</td><td>${returned>0?`<span class="badge badge-ok">${returned} returned</span>`:'-'}</td><td><div style="display:flex;gap:6px">${canReturn?`<button class="btn btn-warning btn-sm" onclick="returnPart(${rp.id},${p.id},${Number(p.qty||0)-returned})">Return</button>`:''}<button class="btn btn-danger btn-sm" onclick="removePartUsed(${rp.id},${p.id})">Remove</button></div></td></tr>`;}).join(''):'<tr><td colspan="5" class="empty">No parts added</td></tr>'}</tbody></table></div>
<div style="margin-top:20px"><div class="card-header"><h3>Payments</h3><button class="btn btn-ghost btn-sm" onclick="showAddPaymentModal(${rp.id})">+ Add Payment</button></div><table><thead><tr><th>Amount</th><th>Method</th><th>Date</th><th>Actions</th></tr></thead><tbody>${pays.length?pays.map(p=>`<tr><td>${formatCurrency(p.amount,p.currency)}</td><td>${esc(p.method||'-')}</td><td>${formatDate(p.created_at||p.date)}</td><td><div style="display:flex;gap:6px"><button class="btn btn-warning btn-sm" onclick="refundPayment(${rp.id},${p.id},${p.amount})">Refund</button><button class="btn btn-danger btn-sm" onclick="deletePayment(${p.id})">Delete</button></div></td></tr>`).join(''):'<tr><td colspan="4" class="empty">No payments recorded</td></tr>'}</tbody></table></div>
<div style="margin-top:16px;padding:16px;background:var(--bg);border-radius:8px"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="color:var(--text-muted)">Parts Total:</span><span>${formatCurrency(totalParts)}</span></div><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="color:var(--text-muted)">Service Fee:</span><span>${rp.status!=='delivered'?`<input type="number" step="0.01" value="${serviceFee}" id="editServiceFee" style="width:120px;padding:4px 8px;background:var(--card);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:13px" onchange="updateServiceFee(${rp.id},this.value)">`:formatCurrency(serviceFee)}</span></div><div style="display:flex;justify-content:space-between;margin-bottom:8px;font-weight:600"><span>Grand Total:</span><span>${formatCurrency(grandTotal)}</span></div><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="color:var(--text-muted)">Total Paid:</span><span style="color:var(--success)">${formatCurrency(totalPaid)}</span></div><div style="display:flex;justify-content:space-between;font-weight:700"><span>Balance Due:</span><span style="color:${balance>0?'var(--danger)':'var(--success)'}">${formatCurrency(balance)}</span></div></div>
<div style="margin-top:20px;display:flex;gap:8px;flex-wrap:wrap">${rp.status!=='delivered'?`<button class="btn btn-primary" onclick="advanceRepairStatus(${rp.id},'${rp.status}')">Advance Status</button>`:''}${canCancel&&isAdmin?`<button class="btn btn-danger" onclick="cancelRepair(${rp.id})">Cancel Repair</button>`:''}<button class="btn btn-ghost" onclick="hideModal()">Close</button></div></div>`);}
async function advanceRepairStatus(id,currentStatus){const idx=STATUSES.indexOf(currentStatus);if(idx>=STATUSES.length-1)return toast('Already at final status','info');const next=STATUSES[idx+1];const r=await api(`/api/repairs/${id}/status`,{method:'PATCH',body:JSON.stringify({status:next})});if(r.ok){toast(`Status updated to ${next}`,'success');hideModal();loadRepairs(state.repairs.page);}else toast(r.data.error||'Failed','error');}
async function cancelRepair(id){if(!confirm('Cancel this repair? This action cannot be undone.'))return;const r=await api(`/api/repairs/${id}/cancel`,{method:'POST'});if(r.ok){toast('Repair cancelled','success');hideModal();loadRepairs(state.repairs.page);}else toast(r.data.error||'Failed to cancel repair','error');}
async function updateServiceFee(repairId,val){const r=await api(`/api/repairs/${repairId}`,{method:'PUT',body:JSON.stringify({service_fee:parseFloat(val)||0})});if(r.ok){toast('Service fee updated','success');showRepairDetail(repairId);}else toast(r.data.error||'Failed','error');}
async function returnPart(repairId,rpId,maxQty){showModal(`<div class="modal-header"><h2>Return Part</h2><button class="modal-close" onclick="hideModal()">&times;</button></div><div class="modal-body"><form onsubmit="doReturnPart(event,${repairId},${rpId})"><div class="form-group"><label>Quantity to Return (max ${maxQty})</label><input type="number" id="returnQty" min="1" max="${maxQty}" value="${maxQty}" required></div><div class="modal-footer"><button type="button" class="btn btn-ghost" onclick="hideModal()">Cancel</button><button type="submit" class="btn btn-warning">Return</button></div></form></div>`);}
async function doReturnPart(e,repairId,rpId){e.preventDefault();const qty=document.getElementById('returnQty').value;const r=await api(`/api/repairs/${repairId}/parts/${rpId}/return?qty=${qty}`,{method:'POST'});if(r.ok){toast('Part returned','success');showRepairDetail(repairId);loadRepairs(state.repairs.page);}else toast(r.data.error||'Failed to return part','error');}
async function refundPayment(repairId,paymentId,amount){if(!confirm(`Refund ${formatCurrency(amount)}?`))return;const r=await api('/api/payments',{method:'POST',body:JSON.stringify({repair_id:repairId,amount:-Math.abs(Number(amount)),currency:state.settings.default_currency,method:'Cash',notes:'Refund for payment #'+paymentId})});if(r.ok){toast('Refund recorded','success');showRepairDetail(repairId);}else toast(r.data.error||'Failed','error');}
async function removePartUsed(repairId,partId){if(!confirm('Remove this part?'))return;const r=await api(`/api/repairs/${repairId}/parts/${partId}`,{method:'DELETE'});if(r.ok){toast('Part removed','success');showRepairDetail(repairId);loadRepairs(state.repairs.page);}else toast(r.data.error||'Failed','error');}
async function deletePayment(id){if(!confirm('Delete this payment?'))return;const r=await api(`/api/payments/${id}`,{method:'DELETE'});if(r.ok){toast('Payment deleted','success');hideModal();loadRepairs(state.repairs.page);}else toast(r.data.error||'Failed','error');}
async function showNewRepairModal(){const[customersRes,staffRes]=await Promise.all([api('/api/customers?limit=100'),api('/api/staff?limit=100')]);const customers=customersRes.ok?(customersRes.data.items||[]):[];const staff=staffRes.ok?(Array.isArray(staffRes.data)?staffRes.data:staffRes.data.items||[]):[];showModal(`<div class="modal-header"><h2>New Repair</h2><button class="modal-close" onclick="hideModal()">&times;</button></div><div class="modal-body"><form onsubmit="createRepair(event)"><div class="form-group"><label>Customer</label><select id="repairCustomer" required><option value="">Select customer</option>${customers.map(c=>`<option value="${c.id}">${esc(c.name)} - ${esc(c.phone||'')}</option>`).join('')}</select><button type="button" class="btn btn-ghost btn-sm" style="margin-top:6px" onclick="showQuickCustomerModal()">+ New Customer</button></div><div class="form-group"><label>Model *</label><input type="text" id="repairModel" required placeholder="e.g. iPhone 14 Pro"></div><div class="form-group"><label>Issues *</label><textarea id="repairIssues" required placeholder="Describe the problems"></textarea></div><div class="form-row"><div class="form-group"><label>IMEI</label><input type="text" id="repairImei" placeholder="Optional"></div><div class="form-group"><label>Estimated Cost</label><input type="number" step="0.01" id="repairCost" placeholder="0.00"></div></div><div class="form-row"><div class="form-group"><label>Service Fee</label><input type="number" step="0.01" id="repairServiceFee" placeholder="0.00"></div><div class="form-group"><label>Assign To</label><select id="repairAssigned"><option value="">Unassigned</option>${staff.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('')}</select></div></div><div class="form-group"><label>Notes</label><textarea id="repairNotes" placeholder="Optional notes"></textarea></div><div class="modal-footer"><button type="button" class="btn btn-ghost" onclick="hideModal()">Cancel</button><button type="submit" class="btn btn-primary">Create Repair</button></div></form></div>`);}
async function createRepair(e){e.preventDefault();const r=await api('/api/repairs',{method:'POST',body:JSON.stringify({customer_id:document.getElementById('repairCustomer').value,model:document.getElementById('repairModel').value,issues:document.getElementById('repairIssues').value,imei:document.getElementById('repairImei').value||undefined,estimated_cost:document.getElementById('repairCost').value||undefined,service_fee:document.getElementById('repairServiceFee').value||undefined,assigned_to:document.getElementById('repairAssigned').value||undefined,notes:document.getElementById('repairNotes').value||undefined})});if(r.ok){toast('Repair created','success');hideModal();loadRepairs();}else toast(r.data.error||'Failed to create repair','error');}
async function showQuickCustomerModal(){showModal(`<div class="modal-header"><h2>New Customer</h2><button class="modal-close" onclick="hideModal()">&times;</button></div><div class="modal-body"><form onsubmit="quickCreateCustomer(event)"><div class="form-group"><label>Name *</label><input type="text" id="qcName" required></div><div class="form-row"><div class="form-group"><label>Phone</label><input type="text" id="qcPhone"></div><div class="form-group"><label>Email</label><input type="email" id="qcEmail"></div></div><div class="modal-footer"><button type="button" class="btn btn-ghost" onclick="hideModal()">Cancel</button><button type="submit" class="btn btn-primary">Create</button></div></form></div>`);}
async function quickCreateCustomer(e){e.preventDefault();const r=await api('/api/customers',{method:'POST',body:JSON.stringify({name:document.getElementById('qcName').value,phone:document.getElementById('qcPhone').value||undefined,email:document.getElementById('qcEmail').value||undefined})});if(r.ok){toast('Customer created','success');hideModal();showNewRepairModal();}else toast(r.data.error||'Failed','error');}
async function showAddPartUsedModal(repairId){const r=await api('/api/parts?limit=100');const parts=r.ok?(r.data.items||[]):[];showModal(`<div class="modal-header"><h2>Add Part</h2><button class="modal-close" onclick="hideModal()">&times;</button></div><div class="modal-body"><form onsubmit="addPartUsed(event,${repairId})"><div class="form-group"><label>Part *</label><select id="addPartId" required><option value="">Select part</option>${parts.map(p=>`<option value="${p.id}">${esc(p.name)} (${esc(p.model||'any')}) - Stock: ${p.stock_qty} - Price: ${formatCurrency(p.selling_price)}</option>`).join('')}</select></div><div class="form-row"><div class="form-group"><label>Quantity</label><input type="number" id="addPartQty" value="1" min="1"></div><div class="form-group"><label>Selling Price</label><input type="number" step="0.01" id="addPartSellingPrice" placeholder="0.00"></div></div><div class="modal-footer"><button type="button" class="btn btn-ghost" onclick="hideModal()">Cancel</button><button type="submit" class="btn btn-primary">Add</button></div></form></div>`);}
async function addPartUsed(e,repairId){e.preventDefault();const partId=document.getElementById('addPartId').value;const qty=document.getElementById('addPartQty').value;const sellingPrice=document.getElementById('addPartSellingPrice').value||0;const r=await api(`/api/repairs/${repairId}/parts?part_id=${partId}&qty=${qty}&selling_price=${sellingPrice}`,{method:'POST'});if(r.ok){toast('Part added','success');hideModal();showRepairDetail(repairId);loadRepairs(state.repairs.page);}else toast(r.data.error||'Failed','error');}
async function showAddPaymentModal(repairId){showModal(`<div class="modal-header"><h2>Add Payment</h2><button class="modal-close" onclick="hideModal()">&times;</button></div><div class="modal-body"><form onsubmit="addPayment(event,${repairId})"><div class="form-row"><div class="form-group"><label>Amount *</label><input type="number" step="0.01" id="payAmount" required></div><div class="form-group"><label>Currency</label><select id="payCurrency">${CURRENCIES.map(c=>`<option value="${c}"${c===state.settings.default_currency?' selected':''}>${c}</option>`).join('')}</select></div></div><div class="form-group"><label>Method *</label><select id="payMethod" required><option value="">Select method</option>${PAYMENT_METHODS.map(m=>`<option value="${m}">${m}</option>`).join('')}</select></div><div class="form-group"><label>Notes</label><input type="text" id="payNotes" placeholder="Optional"></div><div class="modal-footer"><button type="button" class="btn btn-ghost" onclick="hideModal()">Cancel</button><button type="submit" class="btn btn-primary">Record Payment</button></div></form></div>`);}
async function addPayment(e,repairId){e.preventDefault();const r=await api('/api/payments',{method:'POST',body:JSON.stringify({repair_id:repairId,amount:document.getElementById('payAmount').value,currency:document.getElementById('payCurrency').value,method:document.getElementById('payMethod').value,notes:document.getElementById('payNotes').value||undefined})});if(r.ok){toast('Payment recorded','success');hideModal();showRepairDetail(repairId);loadRepairs(state.repairs.page);}else toast(r.data.error||'Failed','error');}
async function loadCustomers(page=1){const f=state.filters;let url=`/api/customers?page=${page}&limit=15`;if(f.search)url+=`&search=${encodeURIComponent(f.search)}`;const r=await api(url);if(r.ok){state.customers={data:r.data.items||[],page:r.data.page||page,total:r.data.total||0};}render();}
function renderCustomers(){const{data,page,total}=state.customers;const pages=Math.ceil(total/15)||1;return`<div class="topbar"><h1>Customers</h1><div class="topbar-actions"><button class="btn btn-primary" onclick="showNewCustomerModal()">+ New Customer</button></div></div><div class="filter-bar"><input type="text" placeholder="Search name or phone..." value="${esc(state.filters.search||'')}" onkeyup="if(event.key==='Enter'){state.filters.search=this.value;loadCustomers()}"><button class="btn btn-ghost btn-sm" onclick="state.filters={};loadCustomers()">Clear</button></div><div class="card"><div class="table-wrap"><table><thead><tr><th>ID</th><th>Name</th><th>Phone</th><th>Email</th><th>Repairs</th><th>Created</th><th>Actions</th></tr></thead><tbody>${data.length?data.map(c=>`<tr><td>#${c.id}</td><td>${esc(c.name)}</td><td>${esc(c.phone||'-')}</td><td>${esc(c.email||'-')}</td><td>${c.repairs_count||c.repair_count||0}</td><td>${formatDate(c.created_at)}</td><td><div style="display:flex;gap:6px"><button class="btn btn-ghost btn-sm" onclick="showCustomerDetail(${c.id})">History</button><button class="btn btn-ghost btn-sm" onclick="showEditCustomerModal(${c.id})">Edit</button><button class="btn btn-danger btn-sm" onclick="deleteCustomer(${c.id})">Delete</button></div></td></tr>`).join(''):'<tr><td colspan="7" class="empty">No customers found</td></tr>'}</tbody></table></div></div><div class="pagination"><button ${page<=1?'disabled':''} onclick="loadCustomers(${page-1})">Prev</button><span style="color:var(--text-muted);font-size:13px">Page ${page} of ${pages}</span><button ${page>=pages?'disabled':''} onclick="loadCustomers(${page+1})">Next</button></div>`;}
async function showNewCustomerModal(){showModal(`<div class="modal-header"><h2>New Customer</h2><button class="modal-close" onclick="hideModal()">&times;</button></div><div class="modal-body"><form onsubmit="createCustomer(event)"><div class="form-group"><label>Name *</label><input type="text" id="custName" required></div><div class="form-row"><div class="form-group"><label>Phone</label><input type="text" id="custPhone"></div><div class="form-group"><label>Email</label><input type="email" id="custEmail"></div></div><div class="form-group"><label>Address</label><input type="text" id="custAddress"></div><div class="modal-footer"><button type="button" class="btn btn-ghost" onclick="hideModal()">Cancel</button><button type="submit" class="btn btn-primary">Create</button></div></form></div>`);}
async function createCustomer(e){e.preventDefault();const r=await api('/api/customers',{method:'POST',body:JSON.stringify({name:document.getElementById('custName').value,phone:document.getElementById('custPhone').value||undefined,email:document.getElementById('custEmail').value||undefined,address:document.getElementById('custAddress').value||undefined})});if(r.ok){toast('Customer created','success');hideModal();loadCustomers();}else toast(r.data.error||'Failed','error');}
async function showEditCustomerModal(id){const r=await api(`/api/customers/${id}`);if(!r.ok)return toast('Failed to load customer','error');const c=r.data;showModal(`<div class="modal-header"><h2>Edit Customer</h2><button class="modal-close" onclick="hideModal()">&times;</button></div><div class="modal-body"><form onsubmit="updateCustomer(event,${id})"><div class="form-group"><label>Name *</label><input type="text" id="custName" value="${esc(c.name)}" required></div><div class="form-row"><div class="form-group"><label>Phone</label><input type="text" id="custPhone" value="${esc(c.phone||'')}"></div><div class="form-group"><label>Email</label><input type="email" id="custEmail" value="${esc(c.email||'')}"></div></div><div class="form-group"><label>Address</label><input type="text" id="custAddress" value="${esc(c.address||'')}"></div><div class="modal-footer"><button type="button" class="btn btn-ghost" onclick="hideModal()">Cancel</button><button type="submit" class="btn btn-primary">Update</button></div></form></div>`);}
async function updateCustomer(e,id){e.preventDefault();const r=await api(`/api/customers/${id}`,{method:'PUT',body:JSON.stringify({name:document.getElementById('custName').value,phone:document.getElementById('custPhone').value||undefined,email:document.getElementById('custEmail').value||undefined,address:document.getElementById('custAddress').value||undefined})});if(r.ok){toast('Customer updated','success');hideModal();loadCustomers(state.customers.page);}else toast(r.data.error||'Failed','error');}
async function deleteCustomer(id){if(!confirm('Delete this customer?'))return;const r=await api(`/api/customers/${id}`,{method:'DELETE'});if(r.ok){toast('Customer deleted','success');loadCustomers(state.customers.page);}else toast(r.data.error||'Failed','error');}
async function showCustomerDetail(id){const r=await api(`/api/customers/${id}`);if(!r.ok)return toast('Failed','error');const c=r.data;const repairs=c.repairs||[];showModal(`<div class="modal-header"><h2>${esc(c.name)}</h2><button class="modal-close" onclick="hideModal()">&times;</button></div><div class="modal-body"><div class="detail-grid"><div class="detail-item"><div class="label">Phone</div><div class="value">${esc(c.phone||'-')}</div></div><div class="detail-item"><div class="label">Email</div><div class="value">${esc(c.email||'-')}</div></div><div class="detail-item detail-full"><div class="label">Address</div><div class="value">${esc(c.address||'-')}</div></div></div><h3 style="margin:20px 0 12px;font-size:16px">Repair History</h3><table><thead><tr><th>ID</th><th>Model</th><th>Status</th><th>Cost</th><th>Date</th></tr></thead><tbody>${repairs.length?repairs.map(rp=>`<tr><td>#${rp.id}</td><td>${esc(rp.model||'-')}</td><td><span class="badge ${STATUS_COLORS[rp.status]||''}">${(rp.status||'').replace('_',' ')}</span></td><td>${formatCurrency(rp.estimated_cost||rp.total_cost)}</td><td>${formatDate(rp.created_at)}</td></tr>`).join(''):'<tr><td colspan="5" class="empty">No repairs</td></tr>'}</tbody></table></div>`);}
async function loadParts(page=1){const f=state.filters;let url=`/api/parts?page=${page}&limit=15`;if(f.search)url+=`&search=${encodeURIComponent(f.search)}`;const r=await api(url);if(r.ok){state.parts={data:r.data.items||[],page:r.data.page||page,total:r.data.total||0};}render();}
function renderParts(){const{data,page,total}=state.parts;const pages=Math.ceil(total/15)||1;const lowStock=data.filter(p=>p.stock_qty<=p.min_stock_alert);return`<div class="topbar"><h1>Inventory</h1><div class="topbar-actions"><button class="btn btn-primary" onclick="showNewPartModal()">+ Add Part</button></div></div>${lowStock.length?`<div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:12px 16px;margin-bottom:16px;color:var(--danger);font-size:13px">&#9888; ${lowStock.length} part(s) below minimum stock level</div>`:''}<div class="filter-bar"><input type="text" placeholder="Search by name or model..." value="${esc(state.filters.search||'')}" onkeyup="if(event.key==='Enter'){state.filters.search=this.value;loadParts()}"><button class="btn btn-ghost btn-sm" onclick="state.filters={};loadParts()">Clear</button></div><div class="card"><div class="table-wrap"><table><thead><tr><th>ID</th><th>SKU</th><th>Name</th><th>Model</th><th>Brand</th><th>Stock</th><th>Unit Price</th><th>Sell Price</th><th>Status</th><th>Actions</th></tr></thead><tbody>${data.length?data.map(p=>`<tr><td>#${p.id}</td><td>${esc(p.sku||'-')}</td><td>${esc(p.name)}</td><td>${esc(p.model||'-')}</td><td>${esc(p.brand_name||'-')}</td><td>${p.stock_qty}</td><td>${formatCurrency(p.unit_price,p.currency)}</td><td>${formatCurrency(p.selling_price,p.currency)}</td><td><span class="badge ${p.stock_qty<=p.min_stock_alert?'badge-low':'badge-ok'}">${p.stock_qty<=p.min_stock_alert?'LOW STOCK':'OK'}</span></td><td><div style="display:flex;gap:6px"><button class="btn btn-ghost btn-sm" onclick="showEditPartModal(${p.id})">Edit</button><button class="btn btn-danger btn-sm" onclick="deletePart(${p.id})">Delete</button></div></td></tr>`).join(''):'<tr><td colspan="10" class="empty">No parts found</td></tr>'}</tbody></table></div></div><div class="pagination"><button ${page<=1?'disabled':''} onclick="loadParts(${page-1})">Prev</button><span style="color:var(--text-muted);font-size:13px">Page ${page} of ${pages}</span><button ${page>=pages?'disabled':''} onclick="loadParts(${page+1})">Next</button></div>`;}
async function loadCatalogForParts(){const[brandsRes,catsRes,typesRes]=await Promise.all([api('/api/catalog/brands'),api('/api/catalog/categories'),api('/api/catalog/types')]);state.catalog.brands=brandsRes.ok?(Array.isArray(brandsRes.data)?brandsRes.data:[]):[];state.catalog.categories=catsRes.ok?(Array.isArray(catsRes.data)?catsRes.data:[]):[];state.catalog.types=typesRes.ok?(Array.isArray(typesRes.data)?typesRes.data:[]):[];}
function generateSKU(){return'PRT-'+Date.now().toString(36).toUpperCase()+'-'+Math.random().toString(36).substr(2,4).toUpperCase();}
function partFormHtml(prefix){const b=state.catalog.brands;const types=state.catalog.types;let typeOpts='';const grouped={};types.forEach(t=>{const catName=(state.catalog.categories.find(c=>c.id===t.category_id)||{}).name||'Uncategorized';if(!grouped[catName])grouped[catName]=[];grouped[catName].push(t);});Object.keys(grouped).forEach(cat=>{typeOpts+=`<optgroup label="${esc(cat)}">`;grouped[cat].forEach(t=>{typeOpts+=`<option value="${t.id}">${esc(t.name)}</option>`;});typeOpts+=`</optgroup>`;});return`<div class="form-row"><div class="form-group"><label>SKU</label><input type="text" id="${prefix}Sku" placeholder="Auto-generated"></div><div class="form-group"><label>Barcode</label><input type="text" id="${prefix}Barcode" placeholder="Supplier barcode"></div></div><div class="form-row"><div class="form-group"><label>Name *</label><input type="text" id="${prefix}Name" required></div><div class="form-group"><label>Model</label><input type="text" id="${prefix}Model" placeholder="e.g. iPhone 14"></div></div><div class="form-row"><div class="form-group"><label>Brand</label><select id="${prefix}Brand" onchange="loadModelsForBrand(this.value,'${prefix}')"><option value="">Select brand</option>${b.map(br=>`<option value="${br.id}">${esc(br.name)}</option>`).join('')}</select></div><div class="form-group"><label>Brand Model</label><select id="${prefix}BrandModel"><option value="">Select model</option></select></div></div><div class="form-group"><label>Part Type</label><select id="${prefix}Type"><option value="">Select type</option>${typeOpts}</select></div><div class="form-row"><div class="form-group"><label>Stock *</label><input type="number" id="${prefix}Stock" required min="0"></div><div class="form-group"><label>Min Alert *</label><input type="number" id="${prefix}MinStock" required min="0" value="5"></div></div><div class="form-row"><div class="form-group"><label>Unit Cost *</label><input type="number" step="0.01" id="${prefix}Price" required></div><div class="form-group"><label>Selling Price *</label><input type="number" step="0.01" id="${prefix}SellPrice" required></div></div><div class="form-group"><label>Currency</label><select id="${prefix}Currency">${CURRENCIES.map(c=>`<option value="${c}"${c===state.settings.default_currency?' selected':''}>${c}</option>`).join('')}</select></div>`;}
async function loadModelsForBrand(brandId,prefix){const sel=document.getElementById(prefix+'BrandModel');if(!sel)return;sel.innerHTML='<option value="">Loading...</option>';if(!brandId){sel.innerHTML='<option value="">Select model</option>';return;}const r=await api(`/api/catalog/models?brand_id=${brandId}`);const models=r.ok?(Array.isArray(r.data)?r.data:[]):[];sel.innerHTML='<option value="">Select model</option>'+models.map(m=>`<option value="${m.id}">${esc(m.name)}</option>`).join('');}
async function showNewPartModal(){await loadCatalogForParts();showModal(`<div class="modal-header"><h2>Add Part</h2><button class="modal-close" onclick="hideModal()">&times;</button></div><div class="modal-body"><form onsubmit="createPart(event)">${partFormHtml('p_')}<div class="modal-footer"><button type="button" class="btn btn-ghost" onclick="hideModal()">Cancel</button><button type="submit" class="btn btn-primary">Add Part</button></div></form></div>`);}
async function createPart(e){e.preventDefault();const sku=document.getElementById('p_Sku').value;const r=await api('/api/parts',{method:'POST',body:JSON.stringify({name:document.getElementById('p_Name').value,sku:sku||undefined,model:document.getElementById('p_Model').value||undefined,brand_id:document.getElementById('p_Brand').value||undefined,brand_model_id:document.getElementById('p_BrandModel').value||undefined,type_id:document.getElementById('p_Type').value||undefined,barcode:document.getElementById('p_Barcode').value||undefined,stock_qty:parseInt(document.getElementById('p_Stock').value),min_stock_alert:parseInt(document.getElementById('p_MinStock').value),unit_price:parseFloat(document.getElementById('p_Price').value),selling_price:parseFloat(document.getElementById('p_SellPrice').value),currency:document.getElementById('p_Currency').value})});if(r.ok){toast('Part added','success');hideModal();loadParts();}else toast(r.data.error||'Failed','error');}
async function showEditPartModal(id){const r=await api(`/api/parts/${id}`);if(!r.ok)return toast('Failed','error');const p=r.data;await loadCatalogForParts();showModal(`<div class="modal-header"><h2>Edit Part</h2><button class="modal-close" onclick="hideModal()">&times;</button></div><div class="modal-body"><form onsubmit="updatePart(event,${id})"><div class="form-row"><div class="form-group"><label>SKU</label><input type="text" id="p_Sku" value="${esc(p.sku||'')}"></div><div class="form-group"><label>Barcode</label><input type="text" id="p_Barcode" value="${esc(p.barcode||'')}"></div></div><div class="form-row"><div class="form-group"><label>Name *</label><input type="text" id="p_Name" value="${esc(p.name)}" required></div><div class="form-group"><label>Model</label><input type="text" id="p_Model" value="${esc(p.model||'')}"></div></div><div class="form-row"><div class="form-group"><label>Brand</label><select id="p_Brand" onchange="loadModelsForBrand(this.value,'p_')"><option value="">Select brand</option>${state.catalog.brands.map(br=>`<option value="${br.id}"${p.brand_id==br.id?' selected':''}>${esc(br.name)}</option>`).join('')}</select></div><div class="form-group"><label>Brand Model</label><select id="p_BrandModel"><option value="">Select model</option></select></div></div><div class="form-group"><label>Part Type</label><select id="p_Type"><option value="">Select type</option>${state.catalog.types.map(t=>{const catName=(state.catalog.categories.find(c=>c.id===t.category_id)||{}).name||'Uncategorized';return`<optgroup label="${esc(catName)}"><option value="${t.id}"${p.type_id==t.id?' selected':''}>${esc(t.name)}</option></optgroup>`;}).join('')}</select></div><div class="form-row"><div class="form-group"><label>Stock *</label><input type="number" id="p_Stock" value="${p.stock_qty}" required min="0"></div><div class="form-group"><label>Min Alert *</label><input type="number" id="p_MinStock" value="${p.min_stock_alert}" required min="0"></div></div><div class="form-row"><div class="form-group"><label>Unit Cost *</label><input type="number" step="0.01" id="p_Price" value="${p.unit_price}" required></div><div class="form-group"><label>Selling Price *</label><input type="number" step="0.01" id="p_SellPrice" value="${p.selling_price||0}" required></div></div><div class="form-group"><label>Currency</label><select id="p_Currency">${CURRENCIES.map(c=>`<option value="${c}"${c===p.currency?' selected':''}>${c}</option>`).join('')}</select></div><div class="modal-footer"><button type="button" class="btn btn-ghost" onclick="hideModal()">Cancel</button><button type="submit" class="btn btn-primary">Update</button></div></form></div>`);if(p.brand_id)loadModelsForBrand(p.brand_id,'p_');}
async function updatePart(e,id){e.preventDefault();const r=await api(`/api/parts/${id}`,{method:'PUT',body:JSON.stringify({name:document.getElementById('p_Name').value,sku:document.getElementById('p_Sku').value||undefined,model:document.getElementById('p_Model').value||undefined,brand_id:document.getElementById('p_Brand').value||undefined,brand_model_id:document.getElementById('p_BrandModel').value||undefined,type_id:document.getElementById('p_Type').value||undefined,barcode:document.getElementById('p_Barcode').value||undefined,stock_qty:parseInt(document.getElementById('p_Stock').value),min_stock_alert:parseInt(document.getElementById('p_MinStock').value),unit_price:parseFloat(document.getElementById('p_Price').value),selling_price:parseFloat(document.getElementById('p_SellPrice').value),currency:document.getElementById('p_Currency').value})});if(r.ok){toast('Part updated','success');hideModal();loadParts(state.parts.page);}else toast(r.data.error||'Failed','error');}
async function deletePart(id){if(!confirm('Delete this part?'))return;const r=await api(`/api/parts/${id}`,{method:'DELETE'});if(r.ok){toast('Part deleted','success');loadParts(state.parts.page);}else toast(r.data.error||'Failed','error');}
async function loadServices(){const r=await api('/api/services');if(r.ok){state.services={data:Array.isArray(r.data)?r.data:r.data.items||[],page:1,total:(Array.isArray(r.data)?r.data.length:r.data.total)||0};}render();}

async function loadPayments(page=1){const f=state.filters;let url=`/api/payments?page=${page}&limit=15`;if(f.date_from)url+=`&date_from=${f.date_from}`;if(f.date_to)url+=`&date_to=${f.date_to}`;if(f.method)url+=`&method=${f.method}`;if(f.search)url+=`&search=${encodeURIComponent(f.search)}`;const r=await api(url);if(r.ok){state.payments={data:r.data.items||[],page:r.data.page||page,total:r.data.total||0,summary:r.data.summary||{}};}render();}
function renderPayments(){const{data,page,total,summary}=state.payments;const pages=Math.ceil(total/15)||1;return`<div class="topbar"><h1>Payments</h1><div class="topbar-actions"><button class="btn btn-primary" onclick="showNewPaymentModal()">+ Record Payment</button></div></div>${summary?`<div class="stats-grid">${Object.entries(summary).map(([k,v])=>`<div class="stat-card blue"><div class="stat-label">${esc(k)}</div><div class="stat-value">${formatCurrency(v,k)}</div></div>`).join('')}</div>`:''}<div class="filter-bar"><input type="date" value="${state.filters.date_from||''}" onchange="state.filters.date_from=this.value;loadPayments()"><input type="date" value="${state.filters.date_to||''}" onchange="state.filters.date_to=this.value;loadPayments()"><select onchange="state.filters.method=this.value;loadPayments()"><option value="">All Methods</option>${PAYMENT_METHODS.map(m=>`<option value="${m}"${state.filters.method===m?' selected':''}>${m}</option>`).join('')}</select><input type="text" placeholder="Search customer..." value="${esc(state.filters.search||'')}" onkeyup="if(event.key==='Enter'){state.filters.search=this.value;loadPayments()}"><button class="btn btn-ghost btn-sm" onclick="state.filters={};loadPayments()">Clear</button></div><div class="card"><div class="table-wrap"><table><thead><tr><th>ID</th><th>Repair#</th><th>Customer</th><th>Amount</th><th>Method</th><th>Date</th><th>Actions</th></tr></thead><tbody>${data.length?data.map(p=>`<tr><td>#${p.id}</td><td>${p.repair_id?'#'+p.repair_id:'-'}</td><td>${esc(p.customer_name||'-')}</td><td>${formatCurrency(p.amount,p.currency)}</td><td>${esc(p.method||'-')}</td><td>${formatDate(p.created_at||p.date)}</td><td><button class="btn btn-danger btn-sm" onclick="deletePaymentFromList(${p.id})">Delete</button></td></tr>`).join(''):'<tr><td colspan="7" class="empty">No payments found</td></tr>'}</tbody></table></div></div><div class="pagination"><button ${page<=1?'disabled':''} onclick="loadPayments(${page-1})">Prev</button><span style="color:var(--text-muted);font-size:13px">Page ${page} of ${pages}</span><button ${page>=pages?'disabled':''} onclick="loadPayments(${page+1})">Next</button></div>`;}
async function showNewPaymentModal(){const r=await api('/api/repairs?limit=100&status=received,diagnosed,waiting_parts,repairing,testing');const repairs=r.ok?(r.data.items||[]):[];showModal(`<div class="modal-header"><h2>Record Payment</h2><button class="modal-close" onclick="hideModal()">&times;</button></div><div class="modal-body"><form onsubmit="createPayment(event)"><div class="form-group"><label>Repair *</label><select id="payRepair" required><option value="">Select repair</option>${repairs.map(rp=>`<option value="${rp.id}">#${rp.id} - ${esc(rp.customer_name||'')} (${esc(rp.model||'')})</option>`).join('')}</select></div><div class="form-row"><div class="form-group"><label>Amount *</label><input type="number" step="0.01" id="payAmt" required></div><div class="form-group"><label>Currency</label><select id="payCur">${CURRENCIES.map(c=>`<option value="${c}"${c===state.settings.default_currency?' selected':''}>${c}</option>`).join('')}</select></div></div><div class="form-group"><label>Method *</label><select id="payMeth" required><option value="">Select method</option>${PAYMENT_METHODS.map(m=>`<option value="${m}">${m}</option>`).join('')}</select></div><div class="form-group"><label>Notes</label><input type="text" id="payNote"></div><div class="modal-footer"><button type="button" class="btn btn-ghost" onclick="hideModal()">Cancel</button><button type="submit" class="btn btn-primary">Record</button></div></form></div>`);}
async function createPayment(e){e.preventDefault();const r=await api('/api/payments',{method:'POST',body:JSON.stringify({repair_id:document.getElementById('payRepair').value,amount:document.getElementById('payAmt').value,currency:document.getElementById('payCur').value,method:document.getElementById('payMeth').value,notes:document.getElementById('payNote').value||undefined})});if(r.ok){toast('Payment recorded','success');hideModal();loadPayments();}else toast(r.data.error||'Failed','error');}
async function deletePaymentFromList(id){if(!confirm('Delete this payment?'))return;const r=await api(`/api/payments/${id}`,{method:'DELETE'});if(r.ok){toast('Payment deleted','success');loadPayments(state.payments.page);}else toast(r.data.error||'Failed','error');}
async function loadExpenses(page=1){const f=state.filters;let url=`/api/expenses?page=${page}&limit=15`;if(f.date_from)url+=`&date_from=${f.date_from}`;if(f.date_to)url+=`&date_to=${f.date_to}`;if(f.category_id)url+=`&category_id=${f.category_id}`;const[r,catRes]=await Promise.all([api(url),api('/api/expenses/categories')]);if(r.ok){state.expenses={data:r.data.items||[],page:r.data.page||page,total:r.data.total||0,monthly_total:r.data.monthly_total||0};}if(catRes.ok){state.expense_categories=Array.isArray(catRes.data)?catRes.data:[];}render();}

-text-muted);font-size:13px">Page ${page} of ${pages}</span><button ${page>=pages?'disabled':''} onclick="loadExpenses(${page+1})">Next</button></div>`;}
async function showNewExpenseModal(){if(!state.expense_categories.length){const catRes=await api('/api/expenses/categories');if(catRes.ok)state.expense_categories=Array.isArray(catRes.data)?catRes.data:[];}showModal(`<div class="modal-header"><h2>Add Expense</h2><button class="modal-close" onclick="hideModal()">&times;</button></div><div class="modal-body"><form onsubmit="createExpense(event)"><div class="form-row"><div class="form-group"><label>Amount *</label><input type="number" step="0.01" id="expAmt" required></div><div class="form-group"><label>Currency</label><select id="expCur">${CURRENCIES.map(c=>`<option value="${c}"${c===state.settings.default_currency?' selected':''}>${c}</option>`).join('')}</select></div></div><div class="form-group"><label>Category *</label><select id="expCat" required><option value="">Select category</option>${(state.expense_categories||[]).map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('')}</select></div><div class="form-group"><label>Date</label><input type="date" id="expDate" value="${new Date().toISOString().split('T')[0]}"></div><div class="form-group"><label>Note</label><input type="text" id="expNote" placeholder="Description"></div><div class="modal-footer"><button type="button" class="btn btn-ghost" onclick="hideModal()">Cancel</button><button type="submit" class="btn btn-primary">Add Expense</button></div></form></div>`);}

function renderSuppliers(){if(state.current_supplier_id)return renderSupplierDetail();const{data,page,total}=state.suppliers;const pages=Math.ceil(total/15)||1;return`<div class="topbar"><h1>Suppliers</h1><div class="topbar-actions"><button class="btn btn-primary" onclick="showNewSupplierModal()">+ Add Supplier</button></div></div><div class="filter-bar"><input type="text" placeholder="Search supplier..." value="${esc(state.filters.search||'')}" onkeyup="if(event.key==='Enter'){state.filters.search=this.value;loadSuppliers()}"><button class="btn btn-ghost btn-sm" onclick="state.filters={};loadSuppliers()">Clear</button></div><div class="card"><div class="table-wrap"><table><thead><tr><th>ID</th><th>Name</th><th>Phone</th><th>Email</th><th>Balance</th><th>Actions</th></tr></thead><tbody>${data.length?data.map(s=>`<tr><td>#${s.id}</td><td>${esc(s.name)}</td><td>${esc(s.phone||'-')}</td><td>${esc(s.email||'-')}</td><td style="font-weight:600;color:${(s.balance||0)>0?'var(--danger)':'var(--success)'}">${formatCurrency(s.balance||0)}</td><td><div style="display:flex;gap:6px"><button class="btn btn-ghost btn-sm" onclick="viewSupplier(${s.id})">View</button><button class="btn btn-ghost btn-sm" onclick="showEditSupplierModal(${s.id})">Edit</button><button class="btn btn-danger btn-sm" onclick="deleteSupplier(${s.id})">Delete</button></div></td></tr>`).join(''):'<tr><td colspan="6" class="empty">No suppliers found</td></tr>'}</tbody></table></div></div><div class="pagination"><button ${page<=1?'disabled':''} onclick="loadSuppliers(${page-1})">Prev</button><span style="color:var(--text-muted);font-size:13px">Page ${page} of ${pages}</span><button ${page>=pages?'disabled':''} onclick="loadSuppliers(${page+1})">Next</button></div>`;}
